apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: memos
  namespace: default
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  ingressClassName: traefik
  tls:
  - hosts:
    - memos.local
    secretName: memos-tls
  rules:
  - host: memos.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: memos
            port:
              number: 5230